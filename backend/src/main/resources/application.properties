spring.application.name=career-twin-api
server.port=${PORT:8080}

# Override credentials locally without committing secrets:
# copy application-local.properties.example -> application-local.properties
spring.config.import=optional:classpath:application-local.properties,optional:file:./application-local.properties

# MySQL — single source of truth
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/twinos?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Resume PDF storage on disk (metadata in MySQL)
twinos.storage.resume-dir=./data/resumes

# RAG microservice URL
twinos.rag.service-url=${RAG_SERVICE_URL:http://localhost:8000}
