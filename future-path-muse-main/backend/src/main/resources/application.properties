spring.application.name=career-twin-api
server.port=8080

# MySQL — single source of truth
spring.datasource.url=jdbc:mysql://localhost:3306/twinos?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Resume PDF storage on disk (metadata in MySQL)
twinos.storage.resume-dir=./data/resumes
